name: Windows-EXE erstellen

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ALKIS_GeoAS_GEOgraf.py"
      - "ALKIS_GeoAS_GEOgraf.spec"
      - "requirements-build.txt"
      - "verify_v120.py"
      - "VERSION.txt"
      - "README.txt"
      - "V1.2.0_VERIFIKATION.txt"
      - ".github/workflows/Build-windows-exe.yml"

permissions:
  contents: read

concurrency:
  group: windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python 3.13 einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: "requirements-build.txt"

      - name: Abhängigkeiten installieren
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: V1.2.0-Quellcode prüfen
        shell: pwsh
        run: |
          python -m py_compile ALKIS_GeoAS_GEOgraf.py
          python verify_v120.py

      - name: Windows-EXE bauen
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean ALKIS_GeoAS_GEOgraf.spec

          $exe = "dist/ALKIS_GeoAS_GEOgraf_V1.2.0.exe"
          if (-not (Test-Path $exe)) {
            throw "Die erwartete EXE wurde nicht erzeugt: $exe"
          }

          $size = (Get-Item $exe).Length
          if ($size -lt 5000000) {
            throw "Die erzeugte EXE ist unerwartet klein: $size Bytes"
          }

      - name: Download-Paket zusammenstellen
        shell: pwsh
        run: |
          $exe = "dist/ALKIS_GeoAS_GEOgraf_V1.2.0.exe"
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Copy-Item $exe "release/ALKIS_GeoAS_GEOgraf_V1.2.0.exe"

          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$hash  ALKIS_GeoAS_GEOgraf_V1.2.0.exe" |
            Set-Content -Encoding ascii "release/SHA256.txt"

          @(
            "Version: 1.2.0"
            "Git-Commit: $env:GITHUB_SHA"
            "GitHub-Run: $env:GITHUB_RUN_ID"
            "Python: $(python --version)"
            "Erzeugt: $([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          ) | Set-Content -Encoding utf8 "release/BUILD_INFO.txt"

          $optionalFiles = @(
            "VERSION.txt",
            "README.txt",
            "V1.2.0_VERIFIKATION.txt",
            "05_Pruefprotokoll_Volltest.txt",
            "PRUEFBERICHT_GITHUB_V1.2.0.txt"
          )

          foreach ($file in $optionalFiles) {
            if (Test-Path $file) {
              Copy-Item $file "release/$file"
            }
          }

      - name: Windows-Paket bereitstellen
        uses: actions/upload-artifact@v7
        with:
          name: ALKIS_GeoAS_GEOgraf_V1.2.0_Windows
          path: release/
          if-no-files-found: error
          retention-days: 30
